<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음클럽 - 콕 공동구매 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .loading-spinner { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .table-container { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 flex items-center gap-3">
                    <i class="fas fa-shuttlecock text-blue-600"></i>
                    참마음클럽 콕 공동구매
                </h1>
                <p class="text-slate-500 mt-1">구글 스프레드시트 실시간 데이터 현황</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-all flex items-center gap-2 shadow-md active:scale-95">
                    <i class="fas fa-sync-alt" id="refresh-icon"></i> 새로고침
                </button>
                <a href="https://docs.google.com/spreadsheets/d/1Dh-SuBPol_ep_HB5GcpSOpsZ9jzqMIBvcBzdf4SgaU4/edit" target="_blank" class="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-50 transition-all flex items-center gap-2">
                    <i class="fas fa-external-link-alt"></i> 시트 열기
                </a>
            </div>
        </header>

        <!-- Tab Menu -->
        <div class="flex border-b border-slate-200 mb-6 overflow-x-auto" id="tabs">
            <button onclick="switchTab('26.1')" id="tab-26.1" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-colors whitespace-nowrap tab-active">26.1</button>
            <button onclick="switchTab('26.2_1')" id="tab-26.2_1" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-colors whitespace-nowrap">26.2_1</button>
            <button onclick="switchTab('26.2_2')" id="tab-26.2_2" class="px-6 py-3 text-slate-500 hover:text-blue-600 transition-colors whitespace-nowrap">26.2_2</button>
        </div>

        <!-- Summary Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="summary-container">
            <!-- Summary cards will be injected here -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 animate-pulse">
                <div class="h-4 w-24 bg-slate-200 rounded mb-4"></div>
                <div class="h-8 w-32 bg-slate-200 rounded"></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 animate-pulse">
                <div class="h-4 w-24 bg-slate-200 rounded mb-4"></div>
                <div class="h-8 w-32 bg-slate-200 rounded"></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 animate-pulse">
                <div class="h-4 w-24 bg-slate-200 rounded mb-4"></div>
                <div class="h-8 w-32 bg-slate-200 rounded"></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 animate-pulse">
                <div class="h-4 w-24 bg-slate-200 rounded mb-4"></div>
                <div class="h-8 w-32 bg-slate-200 rounded"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <!-- Table Filter -->
            <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <div class="relative w-full max-w-xs">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="신청자 이름 검색..." class="pl-10 pr-4 py-2 w-full rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div class="text-sm text-slate-500 hidden md:block">
                    총 <span id="row-count" class="font-bold text-blue-600">0</span>명의 신청 데이터
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table class="w-full text-left border-collapse" id="dataTable">
                    <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm">
                        <tr id="tableHeader" class="text-slate-600 uppercase text-xs font-bold tracking-wider">
                            <!-- Headers injected here -->
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 divide-y divide-slate-100">
                        <!-- Rows injected here -->
                        <tr>
                            <td colspan="10" class="p-12 text-center text-slate-400">
                                <div class="loading-spinner w-8 h-8 border-4 border-slate-200 rounded-full mx-auto mb-4"></div>
                                데이터를 불러오는 중입니다...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer Info -->
        <footer class="mt-8 text-center text-slate-400 text-sm">
            <p>© 2026 참마음클럽 콕 공동구매 관리 시스템</p>
            <p class="mt-1">공구 담당자 문의 및 오류 보고</p>
        </footer>
    </div>

    <script>
        const SPREADSHEET_ID = '1Dh-SuBPol_ep_HB5GcpSOpsZ9jzqMIBvcBzdf4SgaU4';
        let currentSheet = '26.1';
        let allData = [];

        async function fetchData(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
            
            try {
                const response = await fetch(url);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    complete: function(results) {
                        processData(results.data);
                    },
                    header: false
                });
            } catch (error) {
                console.error('Data Fetch Error:', error);
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="10" class="p-10 text-center text-red-500">
                        데이터를 가져오는 데 실패했습니다. 시트 공유 설정을 확인해주세요.
                    </td></tr>`;
            }
        }

        function processData(data) {
            if (!data || data.length === 0) return;

            // 1. Parse Summary (First few rows usually contain meta info)
            // Example: "콕 모델 : 에임리버803", "총공급수량", "100"
            const metaInfo = {};
            let tableStartIndex = 0;

            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                // Check if this row is the table header (Look for '순번' or '신청자')
                if (row.includes('순번') || row.includes('신청자')) {
                    tableStartIndex = i;
                    break;
                }
                // Try to extract key-value pairs from top rows
                for (let j = 0; j < row.length; j += 2) {
                    if (row[j] && row[j+1]) {
                        const key = row[j].replace(/[:]/g, '').trim();
                        metaInfo[key] = row[j+1];
                    }
                }
            }

            renderSummary(metaInfo);

            // 2. Parse Table
            const headers = data[tableStartIndex].filter(h => h !== "");
            const rows = data.slice(tableStartIndex + 1).filter(r => r[1] && r[1] !== "0"); // Filter out empty/0 rows
            
            allData = rows;
            renderTable(headers, rows);
        }

        function renderSummary(meta) {
            const container = document.getElementById('summary-container');
            
            const cards = [
                { title: '콕 모델', value: meta['콕 모델'] || '정보없음', icon: 'fa-box', color: 'text-blue-600' },
                { title: '총 공급수량', value: meta['총공급수량'] || '0', icon: 'fa-cubes', color: 'text-purple-600' },
                { title: '주문 수량', value: meta['주문콕수량'] || '0', icon: 'fa-shopping-cart', color: 'text-orange-600' },
                { title: '남은 수량', value: meta['남은 콕 수'] || meta['남은 콕수량'] || '0', icon: 'fa-check-circle', color: 'text-green-600' }
            ];

            container.innerHTML = cards.map(card => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-start justify-between">
                    <div>
                        <p class="text-sm font-medium text-slate-500 mb-1">${card.title}</p>
                        <h3 class="text-xl font-bold text-slate-800">${card.value}</h3>
                    </div>
                    <div class="p-3 bg-slate-50 rounded-lg ${card.color}">
                        <i class="fas ${card.icon} text-lg"></i>
                    </div>
                </div>
            `).join('');
        }

        function renderTable(headers, rows) {
            const headerRow = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            
            headerRow.innerHTML = headers.map(h => `<th class="p-4 text-sm font-semibold">${h}</th>`).join('');
            
            if (rows.length === 0) {
                body.innerHTML = `<tr><td colspan="${headers.length}" class="p-10 text-center text-slate-400">데이터가 없습니다.</td></tr>`;
                return;
            }

            body.innerHTML = rows.map(row => `
                <tr class="hover:bg-blue-50/30 transition-colors border-b border-slate-100">
                    ${row.slice(0, headers.length).map((cell, idx) => {
                        let cellClass = "p-4 text-sm";
                        let content = cell || "-";
                        
                        // Highlight specific columns
                        if (idx === 1) cellClass += " font-bold text-slate-900"; // Name
                        if (idx === 5 && content.includes('완료')) cellClass += " text-green-600 font-bold"; // Payment
                        if (idx === 6 && content.includes('수령')) cellClass += " text-blue-600 font-bold"; // Received
                        
                        // Currency format for 합계 etc.
                        if (headers[idx].includes('합계') || headers[idx].includes('단가')) {
                            content = isNaN(content.replace(/,/g, '')) ? content : Number(content.replace(/,/g, '')).toLocaleString();
                        }

                        return `<td class="${cellClass}">${content}</td>`;
                    }).join('')}
                </tr>
            `).join('');

            document.getElementById('row-count').innerText = rows.length;
        }

        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toUpperCase();
            const table = document.getElementById('dataTable');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName('td')[1]; // Name column
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }

        function switchTab(sheetName) {
            currentSheet = sheetName;
            
            // Update UI
            document.querySelectorAll('#tabs button').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-slate-500');
            });
            document.getElementById(`tab-${sheetName}`).classList.add('tab-active');
            document.getElementById(`tab-${sheetName}`).classList.remove('text-slate-500');

            // Reset Search
            document.getElementById('searchInput').value = '';
            
            // Fetch
            refreshData();
        }

        function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('fa-spin');
            
            document.getElementById('tableBody').innerHTML = `
                <tr><td colspan="10" class="p-12 text-center text-slate-400">
                    <div class="loading-spinner w-8 h-8 border-4 border-slate-200 rounded-full mx-auto mb-4"></div>
                    최신 데이터를 불러오고 있습니다...
                </td></tr>`;

            fetchData(currentSheet).then(() => {
                setTimeout(() => icon.classList.remove('fa-spin'), 500);
            });
        }

        // Initial Load
        window.onload = () => {
            fetchData(currentSheet);
        };
    </script>
</body>
</html>
